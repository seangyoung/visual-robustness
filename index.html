<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Visual Robustness is a WebXR learning module about perceptual accessibility in data visualization."
    />
    <title>Visual Robustness | WebXR Learning Module</title>
  </head>
  <body>
    <main id="app-shell" aria-label="Visual Robustness WebXR learning module">
      <canvas id="xr-canvas" aria-label="Interactive research gallery scene"></canvas>

      <header class="topbar">
        <div class="brand" aria-label="Visual Robustness">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Visual Robustness</h1>
            <p id="mode-label">Browser learning module</p>
          </div>
        </div>
        <button id="enter-vr" class="primary-action" type="button">Enter VR</button>
      </header>

      <section class="module-panel" aria-live="polite" aria-label="Current module scene">
        <div class="step-kicker" id="step-kicker">Scene 1 of 1</div>
        <h2 id="step-title">Loading</h2>
        <p id="step-prompt"></p>

        <div id="progress-track" class="progress-track" aria-label="Module progress">
          <span id="progress-fill"></span>
        </div>

        <div id="scene-nav" class="control-row">
          <button id="back-step" type="button">Back</button>
          <button id="next-step" class="next-action" type="button">Next</button>
        </div>

        <section id="workbench-controls" class="workbench-controls" aria-label="Visualization Workbench controls">
          <div class="workbench-title">
            <span>Visualization Workbench</span>
            <strong id="workbench-title">Loading</strong>
          </div>

          <div class="example-control">
            <span id="example-label">Example 1 of 2</span>
            <button id="next-example" type="button">Switch example</button>
          </div>

          <label class="range-control" for="robustness-slider">
            <span>Stress Test</span>
            <output id="robustness-value" for="robustness-slider">Typical color</output>
          </label>
          <input id="robustness-slider" type="range" min="0" max="6" step="1" value="0" />

          <label class="toggle-control">
            <input id="reveal-redesign" type="checkbox" />
            <span id="reveal-redesign-label">Show improved design</span>
          </label>
        </section>

        <section id="ranking-panel" class="ranking-panel" aria-label="Robust design ranking">
          <h3>Rank most robust to least robust</h3>
          <p class="ranking-instructions">Grab a visualization card and drag it into a new position.</p>
          <button id="check-ranking" class="secondary-action" type="button">Check Ranking</button>
          <div id="ranking-feedback" class="ranking-feedback" role="status" aria-live="polite" hidden></div>
          <ol id="ranking-list" role="listbox" aria-label="Current visualization ranking"></ol>
        </section>

        <fieldset class="settings-group">
          <legend>Accessibility settings</legend>
          <label>
            <input id="high-contrast" type="checkbox" />
            <span>High contrast</span>
          </label>
          <label>
            <input id="reduced-motion" type="checkbox" />
            <span>Reduced motion</span>
          </label>
        </fieldset>
      </section>

      <div id="status-line" class="status-line" role="status"></div>

      <section class="sr-only" aria-label="Text equivalent">
        <h2>Text Equivalent</h2>
        <p id="text-equivalent"></p>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
